<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#147d64" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="배당노트" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>배당노트</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icons/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <section class="login-view" id="login-view">
        <div class="login-card">
          <p class="eyebrow">부부 전용 배당캘린더</p>
          <h1>배당노트</h1>
          <form id="login-form">
            <label>암호
              <input id="password" type="password" inputmode="numeric" autocomplete="current-password" placeholder="암호 입력" />
            </label>
            <button class="primary-button" type="submit">들어가기</button>
            <p class="form-error" id="login-error"></p>
          </form>
        </div>
      </section>

      <section class="app-view" id="app-view" hidden>
        <header class="topbar">
          <div>
            <p class="eyebrow">우리 집 투자 기록</p>
            <h1>배당노트</h1>
          </div>
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="테마 바꾸기">다크</button>
        </header>

        <main>
          <section class="account-strip" aria-label="계좌 선택">
            <div>
              <p class="section-label">보고 있는 계좌</p>
              <h2 id="account-title">전체 계좌</h2>
            </div>
            <div class="account-controls">
              <select id="account-select" aria-label="보고 싶은 계좌"></select>
              <button class="text-button" id="manage-accounts" type="button">계좌 관리</button>
            </div>
          </section>

          <section class="section calendar-section">
            <div class="section-heading">
              <div>
                <p class="section-label">세후 입금 기준</p>
                <h2>배당캘린더</h2>
              </div>
              <div class="month-switcher">
                <button id="calendar-prev" type="button" aria-label="이전 달">‹</button>
                <b id="calendar-month"></b>
                <button id="calendar-next" type="button" aria-label="다음 달">›</button>
              </div>
            </div>

            <div class="calendar-main">
              <div class="weekday-row">
                <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
              </div>
              <div class="calendar-grid" id="calendar-grid"></div>
            </div>

            <aside class="monthly-summary">
              <p class="section-label">월별 합계</p>
              <div id="monthly-dividend-list"></div>
            </aside>

            <label class="search-box">배당 검색
              <input id="calendar-search" type="search" placeholder="종목명 또는 계좌명" />
            </label>

            <aside class="day-panel" id="day-panel" hidden>
              <div class="day-panel-heading">
              <div>
                <p class="section-label">하루 전체 내역</p>
                <h3 id="day-panel-date"></h3>
              </div>
              <button class="close-panel" id="close-day-panel" type="button" aria-label="하루 내역 닫기">×</button>
            </div>
            <div class="bulk-actions">
              <button class="danger-button small" id="bulk-delete" type="button" disabled>선택 삭제</button>
            </div>
            <div id="day-panel-list"></div>
          </aside>
          </section>
        </main>

        <button class="fab" id="add-dividend" type="button" aria-label="배당 추가">+</button>
      </section>
    </div>

    <dialog id="dividend-dialog">
      <form id="dividend-form">
        <div class="modal-heading">
          <div>
            <p class="section-label" id="dialog-mode">배당 입력</p>
            <h2 id="dialog-title">배당 추가</h2>
          </div>
          <button class="close-button" value="cancel" aria-label="닫기" type="button">×</button>
        </div>
        <input id="dividend-id" type="hidden" />
        <label>입금일<input id="date-input" type="date" required /></label>
        <label>계좌<select id="account-input" required></select></label>
        <label>종목명<input id="stock-input" placeholder="예: CONY" required /></label>
        <label>보유수량<input id="shares-input" type="number" step="0.00000001" min="0" placeholder="예: 0.06" required /></label>
        <label>세후 입금액<input id="amount-input" type="number" step="1" placeholder="예: 421" required /></label>
        <p class="form-error" id="form-error"></p>
        <div class="form-actions">
          <button class="danger-button" id="delete-dividend" type="button" hidden>삭제</button>
          <button class="primary-button" type="submit">저장</button>
        </div>
      </form>
    </dialog>

    <dialog id="account-dialog">
      <form id="account-form">
        <div class="modal-heading">
          <div>
            <p class="section-label">계좌 관리</p>
            <h2>계좌 추가/수정</h2>
          </div>
          <button class="close-button" id="close-account-dialog" aria-label="닫기" type="button">×</button>
        </div>
        <input id="account-id" type="hidden" />
        <label>계좌 이름<input id="account-label" placeholder="예: 내 연금계좌" /></label>
        <p class="form-error" id="account-error"></p>
        <div class="form-actions">
          <button class="danger-button" id="delete-account" type="button" hidden>삭제</button>
          <button class="primary-button" type="submit">저장</button>
        </div>
        <div class="account-list" id="account-list"></div>
      </form>
    </dialog>

    <script src="./app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
